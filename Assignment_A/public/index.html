<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeerostock Inventory Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">Zeerostock</div>
            <p>Find surplus inventory across top suppliers instantly.</p>
        </header>

        <main>
            <section class="search-panel">
                <form id="searchForm">
                    <div class="input-group full-width">
                        <label for="q">Search Product</label>
                        <input type="text" id="q" placeholder="Type a product name...">
                    </div>
                    
                    <div class="filter-row">
                        <div class="input-group">
                            <label for="category">Category</label>
                            <select id="category">
                                <option value="All">All Categories</option>
                                <option value="Furniture">Furniture</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Office Supplies">Office Supplies</option>
                                <option value="Accessories">Accessories</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="minPrice">Min Price ($)</label>
                            <input type="number" id="minPrice" placeholder="0" min="0">
                        </div>
                        <div class="input-group">
                            <label for="maxPrice">Max Price ($)</label>
                            <input type="number" id="maxPrice" placeholder="Any" min="0">
                        </div>
                        <div class="input-group button-group">
                            <button type="submit" class="primary-btn">Search</button>
                        </div>
                    </div>
                </form>
            </section>

            <section class="results-panel">
                <div class="results-header">
                    <h2>Search Results</h2>
                    <span id="resultCount">0 items found</span>
                </div>
                
                <div id="loading" class="hidden">Loading inventory...</div>
                <div id="noResults" class="hidden">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <p>No results found</p>
                        <span>Try adjusting your filters or search query.</span>
                    </div>
                </div>

                <div id="resultsGrid" class="results-grid">
                    <!-- Dynamic Cards Here -->
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
